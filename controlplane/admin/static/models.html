<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duckgres — Control Plane</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07090d;
      --panel: #0d1117;
      --panel2: #11161d;
      --line: #1d2630;
      --line-bright: #2c3a48;
      --text: #c9d6e2;
      --dim: #5a6b7c;
      --worker: #38e1ff;
      --headroom: #ffb224;
      --cp: #c08bff;
      --duckgres: #4ade80;
      --system: #46525e;
      --other: #7e8da0;
      --bad: #ff4d5e;
      --pend: #ffd166;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "IBM Plex Mono", monospace;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse at 50% -10%, rgba(56,225,255,.05), transparent 60%),
        repeating-linear-gradient(0deg, transparent 0 39px, rgba(56,225,255,.025) 39px 40px),
        repeating-linear-gradient(90deg, transparent 0 39px, rgba(56,225,255,.025) 39px 40px);
    }
    #cluster-bar, header, #layout { position: relative; z-index: 1; }

    /* Cluster-context banner — sits above the header in the flex column, so it
       pushes content down rather than overlapping. Hidden until a label loads;
       prod gets a loud red treatment. */
    #cluster-bar {
      flex: none;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 6px 22px;
      font-family: "Chakra Petch", sans-serif;
      font-size: 11px;
      letter-spacing: .24em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--line);
      background: var(--panel2);
      color: var(--dim);
    }
    #cluster-bar.show { display: flex; }
    #cluster-bar.prod {
      background: var(--bad);
      color: #1a0205;
      font-weight: 700;
      border-bottom-color: rgba(0,0,0,.45);
    }

    /* Header */
    header {
      flex: none;
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 14px 22px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #0c1118, #090d12);
    }
    .brand { display: flex; flex-direction: column; line-height: 1.1; }
    .brand .t {
      font-family: "Chakra Petch", sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: .14em;
      color: var(--worker);
      text-shadow: 0 0 18px rgba(56,225,255,.35);
    }
    .brand .s {
      font-size: 9.5px;
      letter-spacing: .3em;
      color: var(--dim);
      text-transform: uppercase;
      margin-top: 2px;
    }
    .spacer { flex: 1; }
    .nav { display: flex; gap: 14px; }
    .nav a {
      color: var(--dim);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      padding-bottom: 2px;
      border-bottom: 1px solid transparent;
    }
    .nav a:hover { color: var(--text); }
    .nav a.active { color: var(--worker); border-bottom-color: var(--worker); }
    #conn {
      display: flex; align-items: center; gap: 7px;
      font-size: 10.5px; letter-spacing: .18em; text-transform: uppercase; color: var(--dim);
    }
    #conn .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--system); }
    #conn.live .dot { background: var(--duckgres); box-shadow: 0 0 10px var(--duckgres); }
    #conn.err .dot { background: var(--bad); box-shadow: 0 0 10px var(--bad); }

    /* Layout */
    #layout { flex: 1; display: flex; overflow: hidden; }

    /* Sidebar */
    #sidebar {
      width: 264px; flex: none; overflow-y: auto;
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 14px 0 24px;
    }
    .grp {
      font-family: "Chakra Petch", sans-serif;
      font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
      color: var(--dim);
      padding: 16px 18px 7px;
      position: relative;
    }
    .grp::after {
      content: ""; position: absolute; left: 18px; right: 18px; bottom: 2px; height: 1px;
      background: linear-gradient(90deg, var(--line-bright), transparent);
    }
    .mitem {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 18px;
      cursor: pointer;
      border-left: 2px solid transparent;
      color: var(--text);
    }
    .mitem:hover { background: var(--panel2); }
    .mitem.active { border-left-color: var(--worker); background: rgba(56,225,255,.07); color: var(--worker); }
    .mitem .lbl { flex: 1; font-size: 12.5px; }
    .mitem .count {
      font-variant-numeric: tabular-nums;
      font-size: 10.5px; color: var(--dim);
      background: var(--panel2); border: 1px solid var(--line);
      border-radius: 4px; padding: 1px 7px; min-width: 26px; text-align: center;
    }
    .mitem.active .count { color: var(--worker); border-color: var(--line-bright); }

    /* Main */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #toolbar {
      flex: none; display: flex; align-items: center; gap: 14px;
      padding: 12px 22px; border-bottom: 1px solid var(--line);
    }
    #toolbar .titleblock { display: flex; flex-direction: column; gap: 2px; line-height: 1.2; }
    #toolbar .title {
      font-family: "Chakra Petch", sans-serif; font-weight: 600;
      font-size: 15px; letter-spacing: .08em; color: var(--text);
    }
    #toolbar .model-desc {
      font-size: 11px; color: var(--dim); letter-spacing: .02em;
      max-width: 640px; white-space: normal;
    }
    #toolbar .model-desc:empty { display: none; }
    #toolbar .tbl-name { font-size: 10.5px; color: var(--dim); letter-spacing: .1em; }
    #toolbar .rowcount { font-size: 10.5px; color: var(--dim); letter-spacing: .18em; text-transform: uppercase; }
    input.search {
      background: var(--panel2); border: 1px solid var(--line-bright); border-radius: 4px;
      color: var(--text); font-family: inherit; font-size: 12px; padding: 5px 10px; width: 230px;
    }
    input.search:focus { outline: none; border-color: var(--worker); }
    button.btn {
      background: var(--panel2); border: 1px solid var(--line-bright); border-radius: 4px;
      color: var(--text); font-family: inherit; font-size: 11px; letter-spacing: .1em;
      text-transform: uppercase; padding: 5px 12px; cursor: pointer;
    }
    button.btn:hover { border-color: var(--worker); color: var(--worker); }

    #table-scroll { flex: 1; overflow: auto; }
    table.tbl { border-collapse: collapse; width: 100%; font-size: 12px; }
    table.tbl thead th {
      position: sticky; top: 0; z-index: 1;
      text-align: left; white-space: nowrap;
      background: var(--panel);
      color: var(--dim); font-weight: 500;
      font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
      padding: 9px 12px; border-bottom: 1px solid var(--line-bright);
    }
    table.tbl thead th.sortable { cursor: pointer; user-select: none; }
    table.tbl thead th.sortable:hover { color: var(--text); }
    table.tbl thead th .sortind { color: var(--worker); margin-left: 5px; font-size: 9px; }
    table.tbl thead th .tipmark { color: var(--cp); margin-left: 4px; font-size: 10px; cursor: help; }
    table.tbl thead th.hastip { text-decoration: underline dotted var(--line-bright); text-underline-offset: 3px; }
    table.tbl tbody td {
      padding: 7px 12px; border-bottom: 1px solid var(--line);
      white-space: nowrap; max-width: 320px; overflow: hidden; text-overflow: ellipsis;
      font-variant-numeric: tabular-nums;
    }
    table.tbl tbody tr { cursor: pointer; }
    table.tbl tbody tr:hover { background: rgba(56,225,255,.06); }
    table.tbl tbody tr.sel { background: rgba(56,225,255,.12); }
    .muted { color: var(--dim); }
    .nestref { color: var(--cp); }
    a.celllink { color: var(--worker); text-decoration: none; border-bottom: 1px dotted var(--worker); cursor: pointer; }
    a.celllink:hover { color: var(--text); border-bottom-color: var(--text); }
    .pill {
      font-size: 10px; letter-spacing: .06em; text-transform: uppercase;
      border-radius: 4px; padding: 1px 7px; border: 1px solid var(--line-bright);
    }
    .pill.ok { color: var(--duckgres); border-color: rgba(74,222,128,.4); }
    .pill.warn { color: var(--headroom); border-color: rgba(255,178,36,.4); }
    .pill.bad { color: var(--bad); border-color: rgba(255,77,94,.4); }
    .pill.dim { color: var(--dim); }
    .pill.bool-t { color: var(--duckgres); border-color: rgba(74,222,128,.4); }
    .pill.bool-f { color: var(--dim); }

    /* Detail */
    #detail {
      width: 440px; flex: none; overflow-y: auto;
      border-left: 1px solid var(--line); background: var(--panel);
      padding: 0 0 30px;
    }
    #detail.hidden { display: none; }
    .dhead {
      position: sticky; top: 0; z-index: 1;
      display: flex; align-items: center; gap: 10px;
      padding: 13px 18px; background: var(--panel);
      border-bottom: 1px solid var(--line-bright);
    }
    .dhead .dt {
      flex: 1; font-family: "Chakra Petch", sans-serif; font-weight: 600;
      font-size: 13px; letter-spacing: .1em; color: var(--worker);
    }
    .dhead .x { cursor: pointer; color: var(--dim); font-size: 16px; padding: 0 4px; }
    .dhead .x:hover { color: var(--bad); }
    .drow {
      display: grid; grid-template-columns: 168px 1fr; gap: 10px;
      padding: 6px 18px; border-bottom: 1px solid var(--line);
      align-items: start;
    }
    .drow .k { color: var(--dim); font-size: 11px; letter-spacing: .04em; word-break: break-word; }
    .drow .v { color: var(--text); font-size: 12px; word-break: break-word; white-space: pre-wrap; }
    details.dsec { border-bottom: 1px solid var(--line); }
    details.dsec > summary {
      list-style: none; cursor: pointer; user-select: none;
      padding: 8px 18px; color: var(--cp);
      font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
      display: flex; align-items: center; gap: 8px;
    }
    details.dsec > summary::-webkit-details-marker { display: none; }
    details.dsec > summary::before { content: "▸"; color: var(--dim); }
    details.dsec[open] > summary::before { content: "▾"; }
    details.dsec > summary:hover { color: var(--worker); }
    details.dsec .dbody { background: rgba(0,0,0,.18); }
    details.dsec .drow { padding-left: 30px; }

    /* Detail edit/delete actions (orgs model) */
    .dhead .btn { padding: 3px 10px; }
    .btn.danger { color: var(--bad); border-color: rgba(255,77,94,.5); }
    .btn.danger:hover { background: var(--bad); border-color: var(--bad); color: #1a0205; }
    .derror { padding: 9px 18px; color: var(--bad); font-size: 11px; border-bottom: 1px solid var(--line); word-break: break-word; }
    .dform .frow {
      display: grid; grid-template-columns: 168px 1fr; gap: 10px;
      padding: 6px 18px; border-bottom: 1px solid var(--line); align-items: center;
    }
    .dform .frow label { color: var(--dim); font-size: 11px; letter-spacing: .04em; }
    .dform .frow input {
      background: var(--panel2); border: 1px solid var(--line-bright); border-radius: 4px;
      color: var(--text); font-family: inherit; font-size: 12px; padding: 5px 8px; width: 100%;
    }
    .dform .frow input:focus { outline: none; border-color: var(--worker); }
    .dform .factions { display: flex; gap: 8px; padding: 13px 18px; }

    .empty { padding: 40px 22px; color: var(--dim); font-size: 12px; letter-spacing: .04em; }
    .loading { padding: 24px 22px; color: var(--dim); }

    /* Session-expired overlay */
    #gate {
      position: fixed; inset: 0; z-index: 10;
      background: rgba(7,9,13,.92);
      display: none; align-items: center; justify-content: center;
    }
    #gate.show { display: flex; }
    #gate .box {
      background: var(--panel2); border: 1px solid var(--bad); border-radius: 6px;
      padding: 26px 30px; text-align: center; max-width: 360px;
    }
    #gate .box h2 { font-family: "Chakra Petch", sans-serif; color: var(--bad); margin: 0 0 8px; letter-spacing: .1em; }
    #gate .box p { color: var(--dim); margin: 0 0 16px; }
    #gate a { color: var(--worker); text-decoration: none; border-bottom: 1px solid var(--worker); }

    /* Scrollbars */
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-thumb { background: var(--line-bright); border-radius: 5px; }
    *::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
  <div id="cluster-bar"></div>
  <header>
    <div class="brand">
      <span class="t">DUCKGRES</span>
      <span class="s">Control Plane</span>
    </div>
    <div class="spacer"></div>
    <nav class="nav">
      <a href="/models" class="active">Models</a>
    </nav>
    <div id="conn"><span class="dot"></span><span id="conn-label">connecting</span></div>
  </header>

  <div id="layout">
    <aside id="sidebar"><div class="loading">Loading models…</div></aside>
    <main id="main">
      <div id="toolbar">
        <div class="titleblock">
          <span class="title" id="model-title">—</span>
          <span class="model-desc" id="model-desc"></span>
        </div>
        <span class="tbl-name" id="model-table"></span>
        <div class="spacer" style="flex:1"></div>
        <span class="rowcount" id="model-count"></span>
        <input class="search" id="search" type="text" placeholder="filter rows…" autocomplete="off">
        <button class="btn" id="refresh">Refresh</button>
      </div>
      <div id="table-scroll"><div class="empty">Select a model from the sidebar.</div></div>
    </main>
    <aside id="detail" class="hidden"></aside>
  </div>

  <div id="gate">
    <div class="box">
      <h2>Session Expired</h2>
      <p>The admin token is no longer valid.</p>
      <a href="/">Reload to sign in</a>
    </div>
  </div>

  <script>
  "use strict";
  const state = { models: [], key: null, listing: null, filter: "", selected: -1, sortCol: null, sortDir: 1 };

  // Per-model column tooltips (shown on the header, native title=). Keep text
  // free of double quotes. Angle-bracket placeholders render literally.
  const COLUMN_TOOLTIPS = {

      users: "Number of users in this org. Click to open Org Users filtered to this org.",
      warehouse: "The org's managed warehouse (1:1, keyed by org name). Click to open it in Managed Warehouses.",
      name: "Org name. Primary key and stable tenant identifier.",
      database_name: "Database name clients connect with (dbname=). Unique across orgs.",
      max_workers: "Maximum concurrent worker pods this org may run. 0 means use the deployment default.",
      max_connections: "Legacy org connection cap. Not used for K8s multi-tenant admission.",
      max_vcpus: "Maximum active worker pod vCPUs this org may have admitted. 0 means unlimited.",
      default_worker_cpu: "Operator-set default worker pod CPU (k8s quantity, e.g. 2). Empty means unset. Applied when a connection does not size itself via duckgres.worker_* options.",
      default_worker_memory: "Operator-set default worker pod memory (k8s quantity, e.g. 8Gi). Empty means unset.",
      default_worker_ttl: "Operator-set default hot-idle TTL for workers (Go duration string, e.g. 75m). Empty means unset.",
      default_worker_min_hot_idle: "Minimum number of default-profile hot-idle workers to keep warm for this org.",
      created_at: "When this org record was created.",
      updated_at: "When this org record was last modified.",
    },
    "org-users": {
      org_id: "Org this user belongs to. Part of the (org_id, username) primary key.",
      username: "Login name, scoped to the org. Part of the primary key.",
      passthrough: "When true, bypass the PostgreSQL compatibility layer (transpiler + pg_catalog) and forward SQL straight to DuckDB. For clients that speak DuckDB SQL natively.",
      default_catalog: "Default catalog (database) selected for this user's sessions. Empty means the deployment default.",
      max_vcpus: "Maximum active worker pod vCPUs this user may have admitted. 0 means unlimited.",
      created_at: "When this user record was created.",
      updated_at: "When this user record was last modified.",
    },
    "org-user-secrets": {
      org_id: "Org that owns this persistent secret. Part of the (org, user, name) primary key.",

    "managed-warehouses": {

      pgbouncer: "Per-org opt-in for the PgBouncer pooler in front of the metadata database.",
      s3: "Resolved activation-time object-store config (provider, region, bucket, path prefix, endpoint, delta-catalog).",
      ducklake: "Whether the org's DuckLake catalog is enabled.",
      iceberg: "Per-org Iceberg (Lakekeeper) catalog config: enabled flag, endpoint, warehouse name, OAuth2 client.",

    },

    "worker-records": {
      worker_id: "Numeric worker id. Primary key.",

      ttl_minutes: "How long the worker stays hot-idle after its last query before the janitor retires it. 0 means use the global hot-idle TTL.",
      state: "Durable lifecycle state (spawning, idle, reserved, activating, hot, hot_idle, draining, retired, lost).",
      org_id: "Org this worker is bound to, if any.",
      owner_cp_instance_id: "Control-plane instance that currently owns this worker.",

    "flight-session-records": {
      session_token: "Opaque Flight session token. Primary key.",
      username: "User that owns the Flight session.",
      org_id: "Org the session belongs to.",
      worker_id: "Worker pod serving this session.",
      pid: "Client backend PID associated with the durable session.",
      owner_epoch: "Worker ownership epoch at the time the session was bound, to fence stale workers.",
      cp_instance_id: "Control-plane instance handling this session.",
      state: "Durable reconnect state (active, reconnecting, expired, closed).",
      expires_at: "When the session reconnect window expires.",
      last_seen_at: "Most recent activity on the session.",
      created_at: "When this session record was created.",
      updated_at: "When this session record was last modified.",
    },
    "org-connection-queue": {
      request_id: "Unique admission request id. Primary key.",
      org_id: "Org requesting resource admission.",
      username: "User requesting resource admission.",
      cp_instance_id: "Control-plane instance that enqueued the request.",
      pid: "Client backend PID associated with the request.",
      protocol: "Client protocol of the request (e.g. postgres, flight).",
      requested_vcpus: "Worker pod vCPUs requested by this admission entry.",
      enqueued_at: "When the request joined the FIFO queue; orders fairness.",
      expires_at: "When this queue entry expires and is reclaimed.",
      granted_at: "When admission was granted, if applicable.",
      created_at: "When this queue entry was created.",
      updated_at: "When this queue entry was last modified.",
    },
    "org-connection-leases": {
      lease_id: "Unique admission lease id. Primary key.",
      request_id: "Queue request id this lease was granted for. Unique.",
      org_id: "Org holding the admission lease.",
      username: "User holding the admission lease.",
      cp_instance_id: "Control-plane instance that owns the lease.",
      pid: "Client backend PID holding the lease.",
      protocol: "Client protocol of the leased connection.",
      requested_vcpus: "Worker pod vCPUs charged to the org and user budgets.",
      acquired_at: "When the lease was acquired; counts toward active vCPU resource budgets.",
      created_at: "When this lease record was created.",
      updated_at: "When this lease record was last modified.",
    },
  };

  // One-line description of each model, shown dim under the model title.
  // Grounded in the configstore struct doc comments.
  const MODEL_DESCRIPTIONS = {
    orgs: "A tenant, with its connection database name, per-org resource limits, and default worker profile.",
    "org-users": "A username mapped to an org, with credentials, passthrough/default-catalog settings, and per-user resource limits.",
    "org-user-secrets": "A customer-set persistent DuckDB secret, scoped to (org, user) and replayed onto the user's worker at session creation.",
    "managed-warehouses": "The config-store source of truth for an org's managed warehouse: image, metadata/object stores, catalogs, identity, and provisioning status.",
    "cp-instances": "A runtime coordination record for one control-plane process, with liveness state and heartbeat.",
    "worker-records": "A durable runtime record for one worker pod: lifecycle state, owner, profile, TTL, and credential expiry.",
    "flight-session-records": "A durable reconnect record for a Flight-only session, binding it to a worker and control-plane instance.",
    "org-connection-queue": "A cluster-wide FIFO resource admission request for one org/user session; rows expire quickly and coordinate fairness across CP replicas.",
    "org-connection-leases": "A durable cluster-wide resource admission lease for a live session; active leases count toward org and user vCPU budgets.",
  };

  // Per-org aux data computed client-side: the live /models/orgs listing does
  // not preload users/warehouse, so we fetch those two models once and group by
  // org_id to render a live user count + warehouse-presence link in the orgs
  // table. Cached until the next orgs load.
  const orgAux = { userCounts: {}, hasWarehouse: {} };
  async function loadOrgAux() {
    try {
      const [users, whs] = await Promise.all([
        api("/api/v1/models/org-users"),
        api("/api/v1/models/managed-warehouses"),
      ]);
      const uc = {}, hw = {};
      for (const u of (users.rows || [])) { if (u.org_id) uc[u.org_id] = (uc[u.org_id] || 0) + 1; }
      for (const w of (whs.rows || [])) { if (w.org_id) hw[w.org_id] = true; }
      orgAux.userCounts = uc;
      orgAux.hasWarehouse = hw;
    } catch (e) { /* on failure leave maps empty; cells still render as links */ }
  }

  // cellHTML renders one table cell, special-casing the orgs cross-model links
  // (users count → Org Users, warehouse → Managed Warehouses), else renderCell.
  function cellHTML(model, col, row) {
    if (model === "orgs" && col === "users") {
      const n = orgAux.userCounts[row.name] || 0;
      return '<a class="celllink" data-nav="org-users" data-filter="' + esc(row.name) + '">' + n + " user" + (n === 1 ? "" : "s") + "</a>";
    }
    if (model === "orgs" && col === "warehouse") {
      if (!orgAux.hasWarehouse[row.name]) return '<span class="muted">—</span>';
      return '<a class="celllink" data-nav="managed-warehouses" data-filter="' + esc(row.name) + '">warehouse →</a>';
    }
    return renderCell(col, row[col]);
  }

  function esc(s) {
    const d = document.createElement("div");
    d.appendChild(document.createTextNode(String(s)));
    return d.innerHTML;
  }
  function setConn(cls, label) {
    const el = document.getElementById("conn");
    el.className = cls;
    document.getElementById("conn-label").textContent = label;
  }

  // api(path[, opts]) — GET by default. opts.method sets the verb; opts.body
  // (any JSON-able value) is sent as a JSON request body with the matching
  // Content-Type. The 401 gate applies to every verb.
  async function api(path, opts) {
    opts = opts || {};
    const init = { headers: { "Accept": "application/json" } };
    if (opts.method) init.method = opts.method;
    if (opts.body !== undefined) {
      init.headers["Content-Type"] = "application/json";
      init.body = JSON.stringify(opts.body);
    }
    const res = await fetch(path, init);
    if (res.status === 401) {
      document.getElementById("gate").classList.add("show");
      throw new Error("unauthorized");
    }
    if (!res.ok) {
      let msg = "HTTP " + res.status;
      try { const j = await res.json(); if (j && j.error) msg = j.error; } catch (e) {}
      throw new Error(msg);
    }
    // 2xx with an empty/non-JSON body (some mutations) → return null.
    try { return await res.json(); } catch (e) { return null; }
  }

  const STATE_COL = /(^|_)(state|status)$/;
  function isStateCol(col) { return STATE_COL.test(col); }
  function statePillClass(v) {
    const s = String(v).toLowerCase();
    if (["ready", "active", "hot", "idle"].includes(s)) return "ok";
    if (["failed", "lost", "expired", "retired", "bad"].includes(s)) return "bad";
    if (["pending", "provisioning", "draining", "reserved", "activating", "spawning", "hot_idle", "reconnecting", "deleting"].includes(s)) return "warn";
    return "dim";
  }

  // renderCell — compact, table-cell value. Objects/arrays collapse to a hint;
  // full structure lives in the detail panel.
  function renderCell(col, v) {
    if (v === null || v === undefined || v === "") return '<span class="muted">—</span>';
    if (typeof v === "boolean") return '<span class="pill ' + (v ? "bool-t" : "bool-f") + '">' + (v ? "true" : "false") + "</span>";
    if (Array.isArray(v)) return '<span class="nestref">[' + v.length + "]</span>";
    if (typeof v === "object") {
      const n = Object.keys(v).length;
      return '<span class="nestref">{' + n + " field" + (n === 1 ? "" : "s") + "}</span>";
    }
    if (isStateCol(col)) return '<span class="pill ' + statePillClass(v) + '">' + esc(v) + "</span>";
    return esc(v);
  }

  function renderSidebar() {
    const order = ["Tenants", "Runtime"];
    const byGroup = {};
    for (const m of state.models) (byGroup[m.group] = byGroup[m.group] || []).push(m);
    const groups = order.filter(g => byGroup[g]).concat(Object.keys(byGroup).filter(g => !order.includes(g)));
    let html = "";
    for (const g of groups) {
      html += '<div class="grp">' + esc(g) + "</div>";
      for (const m of byGroup[g]) {
        const cnt = m.count < 0 ? "?" : m.count;
        html += '<div class="mitem' + (m.key === state.key ? " active" : "") + '" data-key="' + esc(m.key) + '">' +
                '<span class="lbl">' + esc(m.label) + "</span>" +
                '<span class="count">' + cnt + "</span></div>";
      }
    }
    const sb = document.getElementById("sidebar");
    sb.innerHTML = html;
    sb.querySelectorAll(".mitem").forEach(el => el.addEventListener("click", () => selectModel(el.dataset.key)));
  }

  function filteredRows() {
    const rows = (state.listing && state.listing.rows) || [];
    if (!state.filter) return rows;
    const f = state.filter.toLowerCase();
    return rows.filter(r => JSON.stringify(r).toLowerCase().includes(f));
  }

  // cmpScalar compares two non-empty cell values: numbers numerically, booleans
  // false<true, objects/arrays by their JSON, everything else as numeric-aware
  // strings (so "9" < "10" and "worker-2" < "worker-10").
  function cmpScalar(a, b) {
    if (typeof a === "boolean" || typeof b === "boolean") return (a === b) ? 0 : (a ? 1 : -1);
    if (typeof a === "number" && typeof b === "number") return a - b;
    const sa = (a !== null && typeof a === "object") ? JSON.stringify(a) : String(a);
    const sb = (b !== null && typeof b === "object") ? JSON.stringify(b) : String(b);
    return sa.localeCompare(sb, undefined, { numeric: true, sensitivity: "base" });
  }

  // sortRows returns a sorted copy by the active column. Empty/null values
  // always sink to the bottom regardless of direction; the click toggles
  // asc/desc over the remaining values.
  function sortRows(rows) {
    if (!state.sortCol) return rows;
    const c = state.sortCol, d = state.sortDir;
    return rows.slice().sort((x, y) => {
      const a = x[c], b = y[c];
      const ea = a === null || a === undefined || a === "";
      const eb = b === null || b === undefined || b === "";
      if (ea && eb) return 0;
      if (ea) return 1;
      if (eb) return -1;
      return d * cmpScalar(a, b);
    });
  }

  function renderTable() {
    const scroll = document.getElementById("table-scroll");
    const lst = state.listing;
    if (!lst) { scroll.innerHTML = '<div class="empty">Select a model from the sidebar.</div>'; return; }
    const cols = lst.columns || [];
    const rows = sortRows(filteredRows());
    if (!rows.length) {
      scroll.innerHTML = '<div class="empty">' + (lst.count === 0 ? "No rows in this table." : "No rows match the filter.") + "</div>";
      return;
    }
    let html = '<table class="tbl"><thead><tr>';
    const tips = COLUMN_TOOLTIPS[state.key] || {};
    for (const c of cols) {
      const ind = state.sortCol === c ? (state.sortDir === 1 ? "▲" : "▼") : "";
      const tip = tips[c];
      const titleAttr = tip ? ' title="' + esc(tip) + '"' : "";
      const cls = tip ? "sortable hastip" : "sortable";
      const info = tip ? '<span class="tipmark">ⓘ</span>' : "";
      html += '<th class="' + cls + '" data-col="' + esc(c) + '"' + titleAttr + ">" + esc(c) + info + '<span class="sortind">' + ind + "</span></th>";
    }
    html += "</tr></thead><tbody>";
    rows.forEach((r, i) => {
      html += '<tr data-idx="' + i + '">';
      for (const c of cols) html += "<td>" + cellHTML(state.key, c, r) + "</td>";
      html += "</tr>";
    });
    html += "</tbody></table>";
    scroll.innerHTML = html;
    // Cross-model link cells: navigate to the related model filtered to the org,
    // and stop the row-detail click from also firing.
    scroll.querySelectorAll("a.celllink").forEach(a => a.addEventListener("click", e => {
      e.stopPropagation();
      e.preventDefault();
      selectModel(a.dataset.nav, a.dataset.filter);
    }));
    scroll.querySelectorAll("thead th.sortable").forEach(th => th.addEventListener("click", () => {
      const c = th.dataset.col;
      // Same column → flip direction; new column → start ascending.
      if (state.sortCol === c) state.sortDir = -state.sortDir;
      else { state.sortCol = c; state.sortDir = 1; }
      renderTable();
    }));
    scroll.querySelectorAll("tbody tr").forEach(tr => tr.addEventListener("click", () => showDetail(parseInt(tr.dataset.idx, 10), rows)));
  }

  // detailRows — recursively render an object into key/value rows; nested
  // objects (e.g. managed-warehouse sub-configs) become expandable sections.
  function detailRows(obj) {
    let html = "";
    for (const k of Object.keys(obj)) {
      const v = obj[k];
      if (v !== null && typeof v === "object" && !Array.isArray(v)) {
        const open = Object.values(v).some(x => x !== null && x !== "" && x !== false && !(typeof x === "object" && Object.keys(x).length === 0));
        html += '<details class="dsec"' + (open ? " open" : "") + "><summary>" + esc(k) + "</summary><div class=\"dbody\">" + detailRows(v) + "</div></details>";
      } else {
        html += '<div class="drow"><div class="k">' + esc(k) + '</div><div class="v">' + detailValue(k, v) + "</div></div>";
      }
    }
    return html;
  }
  function detailValue(k, v) {
    if (v === null || v === undefined || v === "") return '<span class="muted">—</span>';
    if (typeof v === "boolean") return '<span class="pill ' + (v ? "bool-t" : "bool-f") + '">' + (v ? "true" : "false") + "</span>";
    if (Array.isArray(v)) {
      if (!v.length) return '<span class="muted">[]</span>';
      return v.map(x => (x !== null && typeof x === "object") ? "<pre style=\"margin:0\">" + esc(JSON.stringify(x, null, 2)) + "</pre>" : esc(x)).join("<br>");
    }
    if (isStateCol(k)) return '<span class="pill ' + statePillClass(v) + '">' + esc(v) + "</span>";
    return esc(v);
  }

  // Org detail fields the PUT /orgs/:id endpoint can presence-merge. The map is
  // intersected with the live listing columns (orgEditableCols) so the edit form
  // auto-adapts as columns are added/removed from the model — non-mergeable
  // columns (name, database_name, users, warehouse, *_state, timestamps) are
  // simply never in this allowlist. "int" → numeric input, else text.
  const ORG_EDIT_FIELDS = {
    max_workers: "int",
    max_connections: "int",
    max_vcpus: "int",
    default_worker_cpu: "text",
    default_worker_memory: "text",
    default_worker_ttl: "text",
    default_worker_min_hot_idle: "int",
    hostname_alias: "text",
  };
  function orgEditableCols() {
    const cols = (state.listing && state.listing.columns) || [];
    return cols.filter(c => ORG_EDIT_FIELDS[c]);
  }

  const ORG_USER_EDIT_FIELDS = {
    max_vcpus: "int",
  };
  function orgUserEditableCols() {
    const cols = (state.listing && state.listing.columns) || [];
    return cols.filter(c => ORG_USER_EDIT_FIELDS[c]);
  }

  function showDetail(idx, rows) {
    state.selected = idx;
    const row = rows[idx];
    const panel = document.getElementById("detail");
    panel.classList.remove("hidden");
    if (state.key === "orgs") renderOrgDetail(panel, row, rows, "view");
    else if (state.key === "org-users") renderOrgUserDetail(panel, row, rows, "view");
    else renderReadOnlyDetail(panel, row);
    document.querySelectorAll("#table-scroll tbody tr").forEach(tr =>
      tr.classList.toggle("sel", parseInt(tr.dataset.idx, 10) === idx));
  }

  function renderReadOnlyDetail(panel, row) {
    panel.innerHTML = '<div class="dhead"><span class="dt">' + esc(state.listing.label) +
      '</span><span class="x" id="dclose">✕</span></div>' + detailRows(row);
    document.getElementById("dclose").addEventListener("click", closeDetail);
  }

  // renderOrgDetail renders the orgs detail panel in one of three modes:
  // "view" (read-only rows + Edit/Delete actions), "confirm-delete" (inline
  // confirm in the header, no native confirm()), or "edit" (a form prefilled
  // from the row). errMsg, when set, is shown above the body and the panel
  // stays open so the operator can retry.
  function renderOrgDetail(panel, row, rows, mode, errMsg) {
    const title = esc(state.listing.label);
    const err = errMsg ? '<div class="derror">' + esc(errMsg) + "</div>" : "";
    let head, body;
    if (mode === "confirm-delete") {
      head = '<div class="dhead"><span class="dt">Delete org ' + esc(row.name) + "?</span>" +
        '<button class="btn danger" id="org-del-confirm">Confirm</button>' +
        '<button class="btn" id="org-del-cancel">Cancel</button>' +
        '<span class="x" id="dclose">✕</span></div>';
      body = err + detailRows(row);
    } else if (mode === "edit") {
      head = '<div class="dhead"><span class="dt">' + title + "</span>" +
        '<span class="x" id="dclose">✕</span></div>';
      body = err + orgEditFormHTML(row);
    } else {
      head = '<div class="dhead"><span class="dt">' + title + "</span>" +
        '<button class="btn" id="org-edit">Edit</button>' +
        '<button class="btn danger" id="org-delete">Delete</button>' +
        '<span class="x" id="dclose">✕</span></div>';
      body = detailRows(row);
    }
    panel.innerHTML = head + body;
    document.getElementById("dclose").addEventListener("click", closeDetail);

    if (mode === "confirm-delete") {
      document.getElementById("org-del-cancel").addEventListener("click", () => renderOrgDetail(panel, row, rows, "view"));
      document.getElementById("org-del-confirm").addEventListener("click", async () => {
        try {
          await api("/api/v1/orgs/" + encodeURIComponent(row.name), { method: "DELETE" });
          closeDetail();
          selectModel("orgs");
        } catch (e) {
          if (e.message !== "unauthorized") renderOrgDetail(panel, row, rows, "confirm-delete", e.message);
        }
      });
    } else if (mode === "edit") {
      document.getElementById("org-edit-cancel").addEventListener("click", () => renderOrgDetail(panel, row, rows, "view"));
      document.getElementById("org-edit-save").addEventListener("click", async () => {
        const payload = {};
        for (const c of orgEditableCols()) {
          const inp = document.getElementById("orgf-" + c);
          if (!inp) continue;
          if (ORG_EDIT_FIELDS[c] === "int") payload[c] = inp.value === "" ? 0 : parseInt(inp.value, 10);
          else payload[c] = inp.value;
        }
        try {
          const updated = await api("/api/v1/orgs/" + encodeURIComponent(row.name), { method: "PUT", body: payload });
          await refreshOrgsTable();
          // Re-render the detail from the server's response (falls back to the
          // edited row if the body was empty) so the panel shows stored values.
          renderOrgDetail(panel, updated || row, rows, "view");
        } catch (e) {
          if (e.message !== "unauthorized") renderOrgDetail(panel, row, rows, "edit", e.message);
        }
      });
    } else {
      document.getElementById("org-edit").addEventListener("click", () => renderOrgDetail(panel, row, rows, "edit"));
      document.getElementById("org-delete").addEventListener("click", () => renderOrgDetail(panel, row, rows, "confirm-delete"));
    }
  }

  function orgEditFormHTML(row) {
    let html = '<div class="dform">';
    for (const c of orgEditableCols()) {
      const type = ORG_EDIT_FIELDS[c] === "int" ? "number" : "text";
      const raw = row[c];
      const v = (raw === null || raw === undefined) ? "" : String(raw);
      html += '<div class="frow"><label for="orgf-' + esc(c) + '">' + esc(c) + "</label>" +
        '<input id="orgf-' + esc(c) + '" type="' + type + '" value="' + esc(v) + '"></div>';
    }
    html += '<div class="factions"><button class="btn" id="org-edit-save">Save</button>' +
      '<button class="btn" id="org-edit-cancel">Cancel</button></div></div>';
    return html;
  }

  function renderOrgUserDetail(panel, row, rows, mode, errMsg) {
    const title = esc(state.listing.label);
    const err = errMsg ? '<div class="derror">' + esc(errMsg) + "</div>" : "";
    let head, body;
    if (mode === "edit") {
      head = '<div class="dhead"><span class="dt">' + title + "</span>" +
        '<span class="x" id="dclose">✕</span></div>';
      body = err + orgUserEditFormHTML(row);
    } else {
      head = '<div class="dhead"><span class="dt">' + title + "</span>" +
        '<button class="btn" id="org-user-edit">Edit</button>' +
        '<span class="x" id="dclose">✕</span></div>';
      body = detailRows(row);
    }
    panel.innerHTML = head + body;
    document.getElementById("dclose").addEventListener("click", closeDetail);

    if (mode === "edit") {
      document.getElementById("org-user-edit-cancel").addEventListener("click", () => renderOrgUserDetail(panel, row, rows, "view"));
      document.getElementById("org-user-edit-save").addEventListener("click", async () => {
        const payload = {};
        for (const c of orgUserEditableCols()) {
          const inp = document.getElementById("orguserf-" + c);
          if (!inp) continue;
          if (ORG_USER_EDIT_FIELDS[c] === "int") payload[c] = inp.value === "" ? 0 : parseInt(inp.value, 10);
          else payload[c] = inp.value;
        }
        try {
          const updated = await api("/api/v1/orgs/" + encodeURIComponent(row.org_id) + "/users/" + encodeURIComponent(row.username), { method: "PUT", body: payload });
          await refreshOrgUsersTable();
          renderOrgUserDetail(panel, updated || row, rows, "view");
        } catch (e) {
          if (e.message !== "unauthorized") renderOrgUserDetail(panel, row, rows, "edit", e.message);
        }
      });
    } else {
      document.getElementById("org-user-edit").addEventListener("click", () => renderOrgUserDetail(panel, row, rows, "edit"));
    }
  }

  function orgUserEditFormHTML(row) {
    let html = '<div class="dform">';
    for (const c of orgUserEditableCols()) {
      const type = ORG_USER_EDIT_FIELDS[c] === "int" ? "number" : "text";
      const raw = row[c];
      const v = (raw === null || raw === undefined) ? "" : String(raw);
      html += '<div class="frow"><label for="orguserf-' + esc(c) + '">' + esc(c) + "</label>" +
        '<input id="orguserf-' + esc(c) + '" type="' + type + '" value="' + esc(v) + '"></div>';
    }
    html += '<div class="factions"><button class="btn" id="org-user-edit-save">Save</button>' +
      '<button class="btn" id="org-user-edit-cancel">Cancel</button></div></div>';
    return html;
  }

  // refreshOrgsTable re-fetches the orgs listing + cross-model aux and re-renders
  // the table in place, without disturbing an open detail panel (used after an
  // org edit so the row reflects the change while the panel stays open).
  async function refreshOrgsTable() {
    try {
      const lst = await api("/api/v1/models/orgs");
      state.listing = lst;
      await loadOrgAux();
      document.getElementById("model-count").textContent =
        lst.count + " row" + (lst.count === 1 ? "" : "s") + (lst.truncated ? " (showing first " + lst.rows.length + ")" : "");
      renderTable();
    } catch (e) { /* best-effort table refresh */ }
  }

  async function refreshOrgUsersTable() {
    try {
      const lst = await api("/api/v1/models/org-users");
      state.listing = lst;
      document.getElementById("model-count").textContent =
        lst.count + " row" + (lst.count === 1 ? "" : "s") + (lst.truncated ? " (showing first " + lst.rows.length + ")" : "");
      renderTable();
    } catch (e) { /* best-effort table refresh */ }
  }

  function closeDetail() {
    document.getElementById("detail").classList.add("hidden");
    state.selected = -1;
    document.querySelectorAll("#table-scroll tbody tr.sel").forEach(tr => tr.classList.remove("sel"));
  }

  async function selectModel(key, filterText) {
    state.key = key;
    state.filter = filterText || "";
    state.sortCol = null;
    state.sortDir = 1;
    document.getElementById("search").value = state.filter;
    closeDetail();
    renderSidebar();
    const m = state.models.find(x => x.key === key) || {};
    document.getElementById("model-title").textContent = m.label || key;
    document.getElementById("model-desc").textContent = MODEL_DESCRIPTIONS[key] || "";
    document.getElementById("model-table").textContent = "";
    document.getElementById("model-count").textContent = "";
    document.getElementById("table-scroll").innerHTML = '<div class="loading">Loading…</div>';
    try {
      const lst = await api("/api/v1/models/" + encodeURIComponent(key));
      state.listing = lst;
      // Orgs table needs per-org user counts + warehouse presence (client-side).
      if (key === "orgs") await loadOrgAux();
      // Default sort: first column ascending, so the table opens in a defined,
      // visible order (▲ on column 0) rather than raw DB order.
      state.sortCol = (lst.columns && lst.columns[0]) || null;
      state.sortDir = 1;
      document.getElementById("model-table").textContent = lst.table || "";
      document.getElementById("model-count").textContent =
        lst.count + " row" + (lst.count === 1 ? "" : "s") + (lst.truncated ? " (showing first " + lst.rows.length + ")" : "");
      renderTable();
    } catch (e) {
      if (e.message !== "unauthorized")
        document.getElementById("table-scroll").innerHTML = '<div class="empty">Error: ' + esc(e.message) + "</div>";
    }
  }

  async function loadModels() {
    try {
      const data = await api("/api/v1/models");
      state.models = data.models || [];
      setConn("live", "connected");
      renderSidebar();
      if (state.models.length) selectModel(state.key || state.models[0].key);
    } catch (e) {
      if (e.message !== "unauthorized") {
        setConn("err", "error");
        document.getElementById("sidebar").innerHTML = '<div class="empty">Error: ' + esc(e.message) + "</div>";
      }
    }
  }

  // loadClusterInfo renders the top cluster-context banner. Best-effort: a
  // missing label or an endpoint error just leaves the banner hidden.
  async function loadClusterInfo() {
    try {
      const info = await api("/api/v1/cluster-info");
      const bar = document.getElementById("cluster-bar");
      if (info && info.label) {
        bar.textContent = "CLUSTER: " + info.label;
        bar.className = info.prod ? "show prod" : "show";
      } else {
        bar.className = "";
      }
    } catch (e) { /* banner is best-effort; ignore */ }
  }

  document.getElementById("search").addEventListener("input", e => { state.filter = e.target.value.trim(); renderTable(); });
  document.getElementById("refresh").addEventListener("click", () => { loadModels(); if (state.key) selectModel(state.key); });

  loadClusterInfo();
  loadModels();
  </script>
</body>
</html>
