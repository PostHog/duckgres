<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckgres - Orgs</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-3">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
            <div class="flex items-center space-x-2">
                <span class="text-xl font-bold text-yellow-400">Duckgres</span>
                <span class="text-sm text-gray-400">Admin</span>
            </div>
            <div class="flex space-x-4">
                <a href="/" class="text-gray-400 hover:text-gray-200">Overview</a>
                <a href="/orgs" class="text-yellow-400 hover:text-yellow-300 font-medium">Orgs</a>
                <a href="/workers" class="text-gray-400 hover:text-gray-200">Ducklings</a>
                <a href="/sessions" class="text-gray-400 hover:text-gray-200">Sessions</a>
                <a href="/settings" class="text-gray-400 hover:text-gray-200">Settings</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Orgs</h1>
            <button onclick="document.getElementById('create-form').classList.toggle('hidden')"
                    class="bg-yellow-500 hover:bg-yellow-400 text-gray-900 px-4 py-2 rounded font-medium">
                New Org
            </button>
        </div>

        <div id="create-form" class="hidden bg-gray-800 rounded-lg border border-gray-700 p-6 mb-6">
            <h3 class="text-lg font-semibold mb-4">Create Org</h3>
            <form hx-post="/api/v1/orgs" hx-target="#org-table" hx-swap="innerHTML"
                  hx-on::after-request="if(event.detail.successful) this.reset()">
                <div class="grid grid-cols-2 gap-4">
                    <input name="name" placeholder="Org name" required
                           class="bg-gray-700 border border-gray-600 rounded px-3 py-2 text-gray-100">
                    <input name="database_name" placeholder="Database name (clients connect with dbname=...)"
                           class="bg-gray-700 border border-gray-600 rounded px-3 py-2 text-gray-100">
                    <input name="hostname_alias" placeholder="Hostname alias (optional, single DNS label)"
                           pattern="[A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?"
                           title="Single DNS label: alphanumeric + hyphens, no leading/trailing hyphen, ≤63 chars"
                           class="bg-gray-700 border border-gray-600 rounded px-3 py-2 text-gray-100">
                    <input name="max_workers" type="number" placeholder="Max workers (0=unlimited)"
                           class="bg-gray-700 border border-gray-600 rounded px-3 py-2 text-gray-100">
                    <input name="memory_budget" placeholder="Memory budget (e.g. 8GB)"
                           class="bg-gray-700 border border-gray-600 rounded px-3 py-2 text-gray-100">
                </div>
                <button type="submit" class="mt-4 bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded">
                    Create
                </button>
            </form>
        </div>

        <div id="org-table" hx-get="/api/v1/orgs" hx-trigger="load, every 10s" hx-swap="innerHTML"
             class="bg-gray-800 rounded-lg border border-gray-700 overflow-hidden">
            <div class="p-4 text-gray-400">Loading...</div>
        </div>
    </main>

    <script>
    function esc(s) {
        const d = document.createElement('div');
        d.appendChild(document.createTextNode(s));
        return d.innerHTML;
    }
    document.body.addEventListener('htmx:beforeSwap', function(evt) {
        if (evt.detail.target.id === 'org-table') {
            try {
                const orgs = JSON.parse(evt.detail.serverResponse);
                if (!orgs || orgs.length === 0) {
                    evt.detail.serverResponse = '<div class="p-4 text-gray-400">No orgs configured</div>';
                    return;
                }
                let html = '<table class="w-full"><thead><tr class="text-left text-gray-400 text-sm border-b border-gray-700">' +
                    '<th class="p-3">Name</th><th class="p-3">Database</th><th class="p-3">Hostname Alias</th>' +
                    '<th class="p-3">Users</th><th class="p-3">Max Workers</th>' +
                    '<th class="p-3">Memory Budget</th><th class="p-3">Actions</th></tr></thead><tbody>';
                orgs.forEach(t => {
                    const safeName = esc(t.name);
                    const users = t.users || [];
                    const passthroughCount = users.filter(u => u.passthrough).length;
                    // Surface passthrough usage at a glance — operators reviewing
                    // an org's surface area need to see which logins bypass the
                    // PG compatibility layer without drilling into every user.
                    const userCell = passthroughCount > 0
                        ? `${users.length} <span class="ml-1 px-1.5 py-0.5 rounded text-xs font-medium bg-purple-900 text-purple-300" title="${passthroughCount} passthrough user${passthroughCount === 1 ? '' : 's'}">${passthroughCount} passthrough</span>`
                        : `${users.length}`;
                    // hostname_alias is *string in the API; null = no alias.
                    // Render the SNI hostname this alias produces so operators
                    // can copy-paste it without composing it themselves.
                    const aliasCell = t.hostname_alias
                        ? `<span class="font-mono text-xs">${esc(t.hostname_alias)}</span><span class="text-gray-500 text-xs">.&lt;suffix&gt;</span>`
                        : '<span class="text-gray-500 text-xs">—</span>';
                    html += `<tr class="border-b border-gray-700 hover:bg-gray-750">
                        <td class="p-3 font-medium">${safeName}</td>
                        <td class="p-3 font-mono text-xs">${esc(t.database_name || '')}</td>
                        <td class="p-3">${aliasCell}</td>
                        <td class="p-3">${userCell}</td>
                        <td class="p-3">${t.max_workers || 'unlimited'}</td>
                        <td class="p-3">${esc(t.memory_budget || 'default')}</td>
                        <td class="p-3">
                            <button hx-delete="/api/v1/orgs/${encodeURIComponent(t.name)}" hx-target="#org-table" hx-swap="innerHTML"
                                    hx-confirm="Delete org ${safeName}?"
                                    class="text-red-400 hover:text-red-300 text-sm">Delete</button>
                        </td></tr>`;
                });
                html += '</tbody></table>';
                evt.detail.serverResponse = html;
            } catch(e) {}
        }
    });
    </script>
</body>
</html>
