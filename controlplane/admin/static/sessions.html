<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckgres - Sessions</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-3">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
            <div class="flex items-center space-x-2">
                <span class="text-xl font-bold text-yellow-400">Duckgres</span>
                <span class="text-sm text-gray-400">Admin</span>
            </div>
            <div class="flex space-x-4">
                <a href="/" class="text-gray-400 hover:text-gray-200">Overview</a>
                <a href="/orgs" class="text-gray-400 hover:text-gray-200">Orgs</a>
                <a href="/workers" class="text-gray-400 hover:text-gray-200">Ducklings</a>
                <a href="/sessions" class="text-yellow-400 hover:text-yellow-300 font-medium">Sessions</a>
                <a href="/settings" class="text-gray-400 hover:text-gray-200">Settings</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <h1 class="text-2xl font-bold mb-6">Active Sessions</h1>

        <div id="session-table" hx-get="/api/v1/sessions" hx-trigger="load, every 5s" hx-swap="innerHTML"
             class="bg-gray-800 rounded-lg border border-gray-700 overflow-hidden">
            <div class="p-4 text-gray-400">Loading...</div>
        </div>
    </main>

    <script>
    function esc(s) {
        const d = document.createElement('div');
        d.appendChild(document.createTextNode(s));
        return d.innerHTML;
    }
    document.body.addEventListener('htmx:beforeSwap', function(evt) {
        if (evt.detail.target.id === 'session-table') {
            try {
                const sessions = JSON.parse(evt.detail.serverResponse);
                if (!sessions || sessions.length === 0) {
                    evt.detail.serverResponse = '<div class="p-4 text-gray-400">No active sessions</div>';
                    return;
                }
                let html = '<table class="w-full"><thead><tr class="text-left text-gray-400 text-sm border-b border-gray-700">' +
                    '<th class="p-3">PID</th><th class="p-3">Org</th><th class="p-3">Worker</th></tr></thead><tbody>';
                sessions.forEach(s => {
                    html += `<tr class="border-b border-gray-700">
                        <td class="p-3 font-mono">${s.pid}</td>
                        <td class="p-3">${esc(s.org)}</td>
                        <td class="p-3">${s.worker_id}</td></tr>`;
                });
                html += '</tbody></table>';
                evt.detail.serverResponse = html;
            } catch(e) {}
        }
    });
    </script>
</body>
</html>
