<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckgres - Settings</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-3">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
            <div class="flex items-center space-x-2">
                <span class="text-xl font-bold text-yellow-400">Duckgres</span>
                <span class="text-sm text-gray-400">Admin</span>
            </div>
            <div class="flex space-x-4">
                <a href="/" class="text-gray-400 hover:text-gray-200">Overview</a>
                <a href="/teams" class="text-gray-400 hover:text-gray-200">Teams</a>
                <a href="/workers" class="text-gray-400 hover:text-gray-200">Ducklings</a>
                <a href="/sessions" class="text-gray-400 hover:text-gray-200">Sessions</a>
                <a href="/settings" class="text-yellow-400 hover:text-yellow-300 font-medium">Settings</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <h1 class="text-2xl font-bold mb-6">Settings</h1>

        <div class="space-y-6">
            <div class="bg-gray-800 rounded-lg border border-gray-700 p-6">
                <h2 class="text-lg font-semibold mb-4">Global Configuration</h2>
                <div id="global-config" hx-get="/api/v1/config/global" hx-trigger="load" hx-swap="innerHTML">
                    <div class="text-gray-400">Loading...</div>
                </div>
            </div>

            <div class="bg-gray-800 rounded-lg border border-gray-700 p-6">
                <h2 class="text-lg font-semibold mb-4">Rate Limit Configuration</h2>
                <div id="ratelimit-config" hx-get="/api/v1/config/ratelimit" hx-trigger="load" hx-swap="innerHTML">
                    <div class="text-gray-400">Loading...</div>
                </div>
            </div>

            <div class="bg-gray-800 rounded-lg border border-gray-700 p-6">
                <h2 class="text-lg font-semibold mb-4">Query Log Configuration</h2>
                <div id="querylog-config" hx-get="/api/v1/config/querylog" hx-trigger="load" hx-swap="innerHTML">
                    <div class="text-gray-400">Loading...</div>
                </div>
            </div>
        </div>
    </main>

    <script>
    function esc(s) {
        const d = document.createElement('div');
        d.appendChild(document.createTextNode(s));
        return d.innerHTML;
    }
    function renderConfig(data) {
        let html = '<dl class="grid grid-cols-2 gap-2">';
        for (const [key, value] of Object.entries(data)) {
            if (key === 'updated_at') continue;
            html += `<dt class="text-gray-400">${esc(String(key))}</dt><dd class="text-gray-100">${value === '' ? '-' : esc(String(value))}</dd>`;
        }
        html += '</dl>';
        return html;
    }

    document.body.addEventListener('htmx:beforeSwap', function(evt) {
        const configTargets = ['global-config', 'ratelimit-config', 'querylog-config'];
        if (configTargets.includes(evt.detail.target.id)) {
            try {
                const data = JSON.parse(evt.detail.serverResponse);
                evt.detail.serverResponse = renderConfig(data);
            } catch(e) {}
        }
    });
    </script>
</body>
</html>
