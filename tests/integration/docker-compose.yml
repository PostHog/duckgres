name: duckgres-integration

services:
  # PostgreSQL for comparison testing (existing)
  postgres:
    image: postgres:16-alpine
    container_name: duckgres-test-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
    ports:
      - "35432:5432"
    volumes:
      - ./fixtures/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./fixtures/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  # PostgreSQL for DuckLake metadata storage
  ducklake-metadata:
    image: postgres:16-alpine
    container_name: duckgres-test-ducklake-metadata
    environment:
      POSTGRES_USER: ducklake
      POSTGRES_PASSWORD: ducklake
      POSTGRES_DB: ducklake
    ports:
      - "35433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ducklake -d ducklake"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  # PostgreSQL for Lakekeeper catalog metadata storage
  lakekeeper-metadata:
    image: postgres:16-alpine
    container_name: duckgres-test-lakekeeper-metadata
    environment:
      POSTGRES_USER: lakekeeper
      POSTGRES_PASSWORD: lakekeeper
      POSTGRES_DB: lakekeeper
    ports:
      - "35434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakekeeper -d lakekeeper"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  # Applies Lakekeeper's Postgres migrations before the REST catalog starts.
  lakekeeper-migrate:
    image: quay.io/lakekeeper/catalog:v0.12.2
    container_name: duckgres-test-lakekeeper-migrate
    command: ["migrate"]
    environment:
      LAKEKEEPER__PG_DATABASE_URL_READ: postgres://lakekeeper:lakekeeper@lakekeeper-metadata:5432/lakekeeper
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgres://lakekeeper:lakekeeper@lakekeeper-metadata:5432/lakekeeper
      LAKEKEEPER__PG_ENCRYPTION_KEY: duckgres-local-lakekeeper-key-32
      LAKEKEEPER__BASE_URI: http://localhost:38181
      LAKEKEEPER__ENABLE_DEFAULT_PROJECT: "true"
      LAKEKEEPER__AUTHZ_BACKEND: allowall
    depends_on:
      lakekeeper-metadata:
        condition: service_healthy

  # Lakekeeper Iceberg REST catalog for local integration QA.
  lakekeeper:
    image: quay.io/lakekeeper/catalog:v0.12.2
    container_name: duckgres-test-lakekeeper
    command: ["serve"]
    environment:
      LAKEKEEPER__PG_DATABASE_URL_READ: postgres://lakekeeper:lakekeeper@lakekeeper-metadata:5432/lakekeeper
      LAKEKEEPER__PG_DATABASE_URL_WRITE: postgres://lakekeeper:lakekeeper@lakekeeper-metadata:5432/lakekeeper
      LAKEKEEPER__PG_ENCRYPTION_KEY: duckgres-local-lakekeeper-key-32
      LAKEKEEPER__BASE_URI: http://localhost:38181
      LAKEKEEPER__ENABLE_DEFAULT_PROJECT: "true"
      LAKEKEEPER__AUTHZ_BACKEND: allowall
    ports:
      - "38181:8181"
    healthcheck:
      test: ["CMD", "/home/nonroot/lakekeeper", "healthcheck"]
      interval: 2s
      timeout: 10s
      retries: 10
      start_period: 5s
    depends_on:
      lakekeeper-migrate:
        condition: service_completed_successfully

  # MinIO for DuckLake object storage
  minio:
    image: minio/minio:latest
    container_name: duckgres-test-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "39000:9000"   # S3 API
      - "39001:9001"   # Web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /data

  # Creates the ducklake bucket on startup
  minio-init:
    image: minio/mc:latest
    container_name: duckgres-test-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 minioadmin minioadmin;
      mc mb minio/ducklake --ignore-existing;
      mc anonymous set download minio/ducklake;
      echo 'Bucket ducklake created successfully';
      "
