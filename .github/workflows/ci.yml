name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7.0.1
        with:
          version: v2.8.0

  test-unit:
    name: test-unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: just test-unit

  test-standalone-integration:
    name: test-standalone-integration
    needs: test-unit
    runs-on: ubuntu-latest

    services:
      # PostgreSQL for comparison tests
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 127.0.0.1:35432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # DuckLake metadata store
      ducklake-metadata:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ducklake
          POSTGRES_PASSWORD: ducklake
          POSTGRES_DB: ducklake
        ports:
          - 127.0.0.1:35433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o duckgres .

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 39000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            quay.io/minio/minio:latest server /data
          # Wait for MinIO to be ready
          for i in {1..30}; do
            curl -sf http://localhost:39000/minio/health/live && break
            sleep 1
          done

      - name: Create MinIO bucket
        run: |
          # Install mc client
          curl -sL https://dl.min.io/client/mc/release/linux-amd64/mc -o /tmp/mc
          chmod +x /tmp/mc
          # Configure and create bucket
          /tmp/mc alias set minio http://localhost:39000 minioadmin minioadmin
          /tmp/mc mb minio/ducklake --ignore-existing

      - name: Run standalone integration tests
        run: just test-standalone-integration

  test-control-plane:
    name: test-control-plane
    needs: test-unit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run control-plane tests
        run: just test-control-plane

  test-k8s-integration:
    name: test-k8s-integration
    needs: test-unit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DUCKGRES_KIND_CLUSTER_NAME: duckgres
      DUCKGRES_K8S_TEST_SETUP: kind

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Set up kind
        uses: engineerd/setup-kind@71e45b960fc8dd50b4aeabf6eb6ef2ca0920b4c1 # v0.6.2
        with:
          name: ${{ env.DUCKGRES_KIND_CLUSTER_NAME }}
          skipClusterCreation: true
      - name: Run Kubernetes integration tests
        run: just test-k8s-integration
