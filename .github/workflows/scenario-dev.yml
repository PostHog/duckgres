name: scenario-dev

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: Scenario YAML name under tests/mw-dev/scenario/scenarios, without .yaml
        required: true
        default: full-suite
        type: string
      duckgres_image:
        description: Existing Duckgres image to deploy instead of building this SHA
        required: false
        default: ""
        type: string
  schedule:
    - cron: "17 8 * * *"

permissions:
  id-token: write
  contents: read

concurrency:
  group: scenario-dev-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scenario-runner-image:
    uses: ./.github/workflows/_image-build.yml
    with:
      dockerfile: tests/mw-dev/scenario/Dockerfile
      image-name: duckgres
      tag: scenario-runner-${{ github.run_id }}-${{ github.run_attempt }}-arm64
      platform: linux/arm64
      cache-scope: scenario-runner-arm64
    secrets:
      ecr-role: ${{ secrets.AWS_ECR_PUBLISH_IAM_ROLE }}

  duckgres-image:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.duckgres_image == '' }}
    uses: ./.github/workflows/_image-build.yml
    with:
      dockerfile: Dockerfile
      image-name: duckgres
      tag: scenario-duckgres-${{ github.run_id }}-${{ github.run_attempt }}-arm64
      platform: linux/arm64
      cache-scope: scenario-duckgres-arm64
      build-args: |
        DUCKDB_EXTENSION_VERSION=1.5.3
        HTTPFS_EXTENSION_TAG=v1.5.3-cred-refresh-write-retry
        DUCKLAKE_EXTENSION_TAG=v1.0-posthog.6
        DUCKDB_EXTENSION_REPOSITORY=https://extensions.duckdb.org
        POSTGRES_SCANNER_REPOSITORY=https://extensions.duckdb.org
    secrets:
      ecr-role: ${{ secrets.AWS_ECR_PUBLISH_IAM_ROLE }}

  scenario:
    needs: [scenario-runner-image, duckgres-image]
    if: ${{ always() && needs.scenario-runner-image.result == 'success' && (needs.duckgres-image.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.duckgres_image != '')) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 270
    env:
      SCENARIO_RUNNER_IMAGE: ${{ needs.scenario-runner-image.outputs.image }}
      WORKER_IMAGE: ${{ (github.event_name == 'workflow_dispatch' && inputs.duckgres_image) || needs.duckgres-image.outputs.image }}
      CONTROLPLANE_IMAGE: ${{ (github.event_name == 'workflow_dispatch' && inputs.duckgres_image) || needs.duckgres-image.outputs.image }}
      KUBE_CONTEXT: posthog-mw-dev
      CLUSTER_NAME: posthog-mw-dev
      EKS_CLUSTER_NAME: posthog-mw-dev
      AWS_REGION: us-east-1
      CP_POD_IDENTITY_ROLE: arn:aws:iam::${{ secrets.MW_DEV_ACCOUNT_ID }}:role/duckgres-control-plane-dev
      PR_NUMBER: ${{ github.run_id }}
      NAMESPACE: duckgres-ci-pr-${{ github.run_id }}
      DUCKGRES_SCENARIO_MAX_RUNTIME: 4h
      DUCKGRES_SCENARIO_GO_TEST_TIMEOUT: 4h15m
      # Frozen pgwire perf needs more than the shared e2e harness defaults.
      DUCKGRES_K8S_WORKER_CPU_REQUEST: "2"
      DUCKGRES_K8S_WORKER_MEMORY_REQUEST: 4Gi
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Scenario dev target selected
        env:
          SCENARIO_NAME: ${{ inputs.scenario || 'full-suite' }}
        run: echo "Deploying an isolated Duckgres stack for $SCENARIO_NAME."

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Test scenario workflow scripts
        run: go test -count=1 ./tests/mw-dev/scenario ./tests/mw-dev

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.MW_DEV_ACCOUNT_ID }}:role/github-duckgres-e2e
          aws-region: us-east-1
          # Covers this job's 270-minute timeout so long dbt runs can still
          # collect artifacts and tear down the isolated namespace.
          role-duration-seconds: 16200

      - name: Connect to Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ vars.TS_WIF_CLIENT_ID_MW_DEV }}
          audience: ${{ vars.TS_WIF_AUDIENCE_MW_DEV }}
          tags: tag:github-runner

      - name: Install kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION" --alias "$KUBE_CONTEXT"

      - name: Deploy isolated Duckgres stack
        run: tests/mw-dev/run.sh deploy

      - name: Run selected scenario
        env:
          SCENARIO_NAME: ${{ inputs.scenario || 'full-suite' }}
        run: tests/mw-dev/run.sh test-scenario

      - name: Publish scenario summary
        if: always()
        run: |
          set -euo pipefail
          summary_file="$(find artifacts/scenario-dev -type f -name scenario_summary.md -print -quit 2>/dev/null || true)"
          if [ -n "$summary_file" ]; then
            cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Scenario result"
              echo
              echo "Scenario summary unavailable. Inspect the job log and any uploaded partial artifact."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Collect diagnostics
        if: failure()
        run: tests/mw-dev/run.sh diagnostics

      - name: Teardown
        if: always()
        run: tests/mw-dev/run.sh teardown

      - name: Upload scenario artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scenario-dev-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/scenario-dev/
          if-no-files-found: warn
          retention-days: 14
