services:
  config-store-postgres:
    image: postgres:16-alpine
    container_name: duckgres-config-store
    environment:
      POSTGRES_USER: duckgres
      POSTGRES_PASSWORD: duckgres
      POSTGRES_DB: duckgres_config
    ports:
      - "5434:5432"
    volumes:
      - duckgres-config-store-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duckgres -d duckgres_config"]
      interval: 5s
      timeout: 5s
      retries: 5

  warehouse-postgres:
    image: postgres:16-alpine
    container_name: duckgres-local-warehouse-db
    environment:
      POSTGRES_USER: duckgres
      POSTGRES_PASSWORD: duckgres
      POSTGRES_DB: duckgres_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duckgres -d duckgres_local"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data

  ducklake-metadata:
    image: postgres:16-alpine
    container_name: duckgres-local-ducklake-metadata
    environment:
      POSTGRES_USER: ducklake
      POSTGRES_PASSWORD: ducklake
      POSTGRES_DB: ducklake_metadata_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ducklake -d ducklake_metadata_local"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: duckgres-local-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    tmpfs:
      - /data

volumes:
  duckgres-config-store-data:
