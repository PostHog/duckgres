# Optional: pre-create the bearer token secret.
# If not created, the control plane auto-generates one at startup.
#
# To generate a token:
#   kubectl create secret generic duckgres-worker-token \
#     --namespace duckgres \
#     --from-literal=bearer-token=$(openssl rand -hex 32)
apiVersion: v1
kind: Secret
metadata:
  name: duckgres-worker-token
  namespace: duckgres
  labels:
    app: duckgres
type: Opaque
data: {}
  # bearer-token: <base64-encoded-token>
