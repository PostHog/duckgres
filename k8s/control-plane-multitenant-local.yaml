apiVersion: apps/v1
kind: Deployment
metadata:
  name: duckgres-control-plane
  namespace: duckgres
  labels:
    app: duckgres-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: duckgres-control-plane
  template:
    metadata:
      labels:
        app: duckgres-control-plane
    spec:
      serviceAccountName: duckgres-control-plane
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: control-plane
          image: duckgres:test
          imagePullPolicy: IfNotPresent
          args:
            - "--mode"
            - "control-plane"
            - "--worker-backend"
            - "remote"
            - "--config-store"
            - "postgres://duckgres:duckgres@host.docker.internal:5434/duckgres_config?sslmode=disable"
            - "--config-poll-interval"
            - "2s"
            - "--k8s-worker-image"
            - "duckgres:test"
            - "--k8s-worker-image-pull-policy"
            - "Never"
            - "--k8s-worker-secret"
            - "duckgres-worker-token"
            - "--k8s-worker-configmap"
            - "duckgres-config"
            - "--k8s-shared-warm-target"
            - "1"
            - "--cert"
            - "/certs/server.crt"
            - "--key"
            - "/certs/server.key"
            - "--config"
            - "/etc/duckgres/duckgres.yaml"
            - "--flight-port"
            - "8815"
            - "--flight-session-idle-ttl"
            - "30s"
            - "--flight-session-reap-interval"
            - "10s"
          ports:
            - name: pg
              containerPort: 5432
              protocol: TCP
            - name: flight
              containerPort: 8815
              protocol: TCP
            - name: admin
              containerPort: 9090
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/duckgres
              readOnly: true
            - name: certs
              mountPath: /certs
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: admin
            initialDelaySeconds: 2
            periodSeconds: 2
            failureThreshold: 15
          securityContext:
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: config
          configMap:
            name: duckgres-config
        - name: certs
          emptyDir: {}
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: duckgres
  namespace: duckgres
  labels:
    app: duckgres-control-plane
spec:
  type: ClusterIP
  ports:
    - name: pg
      port: 5432
      targetPort: pg
      protocol: TCP
    - name: flight
      port: 8815
      targetPort: flight
      protocol: TCP
  selector:
    app: duckgres-control-plane
