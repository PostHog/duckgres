# Cluster-scoped read for the admin console's live "Nodes" topology view
# (GET /api/v1/cluster/{nodes,pods,events,nodepools} — controlplane/admin/cluster.go).
# The control-plane's in-namespace Role (k8s/rbac.yaml) only covers pods in the
# duckgres namespace; the Nodes view lists nodes, pods across ALL namespaces,
# events, and the karpenter NodePool CRD (cluster-scoped), so it needs this extra
# read-only ClusterRole. Apply it when exposing the admin console. Read-only:
# there is no mutation path through these endpoints.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: duckgres-control-plane-cluster-topology
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "events"]
    verbs: ["get", "list"]
  - apiGroups: ["karpenter.sh"]
    resources: ["nodepools"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: duckgres-control-plane-cluster-topology
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: duckgres-control-plane-cluster-topology
subjects:
  - kind: ServiceAccount
    name: duckgres-control-plane
    namespace: duckgres
