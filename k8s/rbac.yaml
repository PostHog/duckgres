apiVersion: v1
kind: ServiceAccount
metadata:
  name: duckgres-control-plane
  namespace: duckgres
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: duckgres-control-plane
  namespace: duckgres
rules:
  # Manage worker pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # Coordinate leader election for janitor work
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
  # Read bearer token secret; create if auto-generating; update if key missing
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: duckgres-control-plane
  namespace: duckgres
subjects:
  - kind: ServiceAccount
    name: duckgres-control-plane
    namespace: duckgres
roleRef:
  kind: Role
  name: duckgres-control-plane
  apiGroup: rbac.authorization.k8s.io
